<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Food Store</title>
</head>
<body class="layout-simple">
  <header>
    <h1>Food Store</h1>
    <nav>
      <ul>
        <li><a href="../home/index.html">Inicio</a></li>
        <li><a href="./index.html" data-nav="cart" class="nav-active">Carrito (<span id="badge-carrito">0</span>)</a></li>
        <li><a href="../../client/orders/index.html" data-nav="orders">Mis Pedidos</a></li>
        <li id="nav-admin" hidden><a href="../../admin/index.html">Panel Admin</a></li>
        <li><button type="button" id="btn-cerrar-sesion" class="link-button">Salir</button></li>
      </ul>
    </nav>
  </header>

  <main>
    <p id="saludo-usuario" class="saludo"></p>

    <section id="seccion-carrito">
      <h2>Carrito de compras</h2>
      <div id="contenedor-carrito"></div>
      <p><strong>Subtotal: <span id="carrito-total">$0</span></strong></p>
      <button type="button" id="btn-proceder-pago" class="btn-proceder" hidden>Proceder al Pago</button>
    </section>

    <section id="seccion-checkout" hidden>
      <h2>Checkout</h2>
      <p>Completá tus datos para confirmar el pedido.</p>
      <form id="form-checkout" class="form-checkout">
        <label for="checkout-telefono">Teléfono *</label>
        <input type="tel" id="checkout-telefono" name="telefono" required placeholder="Ej: 3815551234">

        <label for="checkout-direccion">Dirección de entrega *</label>
        <input type="text" id="checkout-direccion" name="direccion" required placeholder="Calle, número, barrio">

        <label for="forma-pago">Forma de pago</label>
        <select id="forma-pago" name="formaPago">
          <option value="TARJETA">Tarjeta</option>
          <option value="TRANSFERENCIA">Transferencia</option>
          <option value="EFECTIVO" selected>Efectivo</option>
        </select>

        <p class="checkout-resumen">
          Envío: <strong id="checkout-envio">$500,00</strong> —
          Total: <strong id="checkout-total">$0,00</strong>
        </p>

        <div class="checkout-actions">
          <button type="button" id="btn-volver-carrito" class="btn-secondary">Volver al carrito</button>
          <button type="submit" class="btn-primary">Confirmar pedido</button>
        </div>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; Food Store</p>
  </footer>

  <script type="module" src="./index.ts"></script>
</body>
</html>
