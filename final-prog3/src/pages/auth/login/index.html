<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Food Store</title>
  <link rel="stylesheet" href="/src/pages/auth/auth-shared.css">
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <h1>Food Store</h1>
      <h2>Iniciar sesión</h2>
      <p id="mensaje" class="msg" hidden></p>
      <form id="formulario-login" novalidate>
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder="tuemail@ejemplo.com"
          required
        >
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          placeholder="Ingresá tu contraseña"
          required
        >
        <button type="submit">Ingresar</button>
      </form>
      <p class="auth-footer">
        ¿No tenés cuenta?
        <a href="../registro/index.html">Registrar a un nuevo usuario</a>
      </p>
    </section>
  </main>
  <script type="module" src="./index.ts"></script>
</body>
</html>
