<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Food Store</title>
  <link rel="stylesheet" href="/src/pages/auth/auth-shared.css">
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <h1>Food Store</h1>
      <h2>Registrar a un nuevo usuario</h2>
      <p id="mensaje" class="msg" hidden></p>
      <form id="formulario-registro" novalidate>
        <label for="nombre">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          autocomplete="given-name"
          placeholder="Tu nombre"
          required
          minlength="2"
        >
        <label for="apellido">Apellido</label>
        <input
          type="text"
          id="apellido"
          name="apellido"
          autocomplete="family-name"
          placeholder="Tu apellido"
          required
          minlength="2"
        >
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder="tuemail@ejemplo.com"
          required
        >
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="new-password"
          placeholder="Mínimo 6 caracteres"
          required
          minlength="6"
        >
        <button type="submit">Registrarme</button>
      </form>
      <p class="auth-footer">
        ¿Ya tenés cuenta?
        <a href="../login/index.html">Iniciar sesión</a>
      </p>
    </section>
  </main>
  <script type="module" src="./index.ts"></script>
</body>
</html>
